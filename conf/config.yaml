project_name: "beer_game_marl"
seed: 42
total_episodes: 15000  # Increased for full convergence

env:
  horizon: 50
  max_order: 100
  holding_cost: 0.5
  backorder_cost: 1.0
  lookahead: 4
  demand_type: "poisson"
  jittery_lead_time: False
  reward_alpha: 0.1      # FIX 1: Softened Cooperation Weight (prevents global punishment from crushing local learning)

agent:
  algorithm: "comm_mappo"
  hidden_dim: 256        # FIX 2: Doubled capacity so the Centralized Critic can process 24 dimensions
  lr_actor: 3e-4
  lr_critic: 1e-3
  gamma: 0.99
  k_epochs: 4
  eps_clip: 0.1
  entropy_coef: 0.10     # FIX 3: Massive increase to force exploration and escape the Zero-Order Trap
  max_grad_norm: 0.2
  comm_penalty_coef: 0.0001
  warm_up_episodes: 1000