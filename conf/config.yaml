project_name: "beer_game_marl"
seed: 42
total_episodes: 15000  # Increased for full convergence

env:
  horizon: 50
  max_order: 100
  holding_cost: 0.5
  backorder_cost: 1.0
  lookahead: 4
  demand_type: "poisson"
  jittery_lead_time: False

agent:
  algorithm: "mappo"
  hidden_dim: 128
  lr_actor: 3e-4
  lr_critic: 1e-3
  gamma: 0.99
  k_epochs: 4
  eps_clip: 0.2
  entropy_coef: 0.05
  max_grad_norm: 0.5        # Moved from script to config
  comm_penalty_coef: 0.001  # Information Bottleneck coefficient
  warm_up_episodes: 1000