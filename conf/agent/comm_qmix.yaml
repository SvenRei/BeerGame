algorithm: "comm_qmix"
hidden_dim: 256
# Action space -- see agents/action_space.py (21 actions; was 101 -> chronic over-ordering).
n_actions: 21
action_mode: "absolute"   # swept over {absolute, centered}
abs_cap: 40               # absolute mode: effective max order
centered_range: 10        # centered mode: x in [-10, +10]
vocab_size: 3  # supported values: 1 (no-comm control), 3, 5  (see comm_utils.get_vocab_tensor)
mixing_embed_dim: 256
hypernet_embed: 64
lr: 1e-3
gamma: 0.99
target_update_freq: 200
buffer_size: 5000
batch_size: 32
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_episodes: 5000
comm_penalty_coef: 0.0
tau_decay_episodes: 7500   # ADDED: Gumbel tau 1.0 -> 0.1 over this many episodes; swept in sweep_comm_qmix.yaml
warm_up_episodes: 1000
patience: 2000
updates_per_episode: 1
reward_scale: 100
lr_scheduler_step: 2000
lr_scheduler_gamma: 0.5
tau_min: 0.1   # Gumbel temperature floor; swept in the comm sweeps
# --- NDQ expressiveness ("listening") loss (Wang et al., ICLR 2020) ---------
# Weight on the cross-entropy that trains a shared decoder q_xi(a_j|o_j,m_in_j)
# to predict the receiver's action from its obs + incoming message. >0 enables
# it (requires vocab_size>1). This REPLACES the old CIC/KL positive-listening
# bonus, which was gameable by a constant message (single-token collapse).
# Start ~0.1-0.5; sweep this axis.
expr_decoder_hidden: 128
# DEPRECATED: kept only for config/back-compat; no longer used by the loss.
listening_kl_clip: 2.0
listening_coef: 0.2     # NDQ Expressiveness
succinctness_coef: 0.01 # NDQ Parsimony / Information Bottleneck
# ---- variant selectors (train_comm_qplex.py) ----
mixer: "qmix"
reader: "concat"
qplex_embed: 64
qplex_heads: 4
tarmac_key_dim: 16
tarmac_heads: 4
normalize_returns: true