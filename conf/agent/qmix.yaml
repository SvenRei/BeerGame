# ==============================================================================
# QMIX ALGORITHM CONFIGURATION
# ==============================================================================
# Name of the algorithm used for logging and logic routing
algorithm: "qmix"
# Size of the hidden memory state (GRU) for the local agents
hidden_dim: 256

# --- ACTION SPACE (see agents/action_space.py) ---
# 21 discrete actions. The old 101-way space spanned orders 0..100 while demand is
# only ~8, so epsilon-greedy / diffuse policies averaged an order of ~50 and the
# agents chronically over-ordered (200+ units of inventory). 21 actions is the sweet
# spot for both parameterizations below.
n_actions: 21
# action_mode is swept over {absolute, centered}:
#   absolute -> order = round(idx/(n_actions-1) * abs_cap)  (capped, shrunk range)
#   centered -> order = clip(observed_demand + (idx - centered_range), 0, max_order)  (d+x rule)
action_mode: "absolute"
abs_cap: 40          # absolute mode: effective max order (idx step = abs_cap/(n_actions-1) = 2)
centered_range: 10   # centered mode: x in [-10, +10]; n_actions == 2*centered_range+1

# Internal embedding size for the central mixing network
mixing_embed_dim: 256
# Internal embedding size for the hypernetwork weight generator
hypernet_embed: 64
# Maximum number of past experiences to store in the off-policy memory
buffer_size: 5000
# Number of past experiences to sample for each gradient descent step
batch_size: 32
# Discount factor for future rewards (how much the agent cares about the long term)
gamma: 0.99
# How often (in total steps) to copy online weights to the stable target network
target_update_freq: 200
# Learning rate for the Adam optimizer updating the networks
lr: 0.001
# Starting exploration rate (1.0 = 100% random actions)
epsilon_start: 1.0
# Minimum exploration rate (0.05 = 5% random actions to prevent getting stuck)
epsilon_end: 0.05
# Over how many episodes the exploration rate decays from start to end
epsilon_decay_episodes: 5000
# Number of initial episodes to play purely to fill the buffer before evaluating
warm_up_episodes: 1000

patience: 2000
updates_per_episode: 1
reward_scale: 100
lr_scheduler_step: 2000
lr_scheduler_gamma: 0.5