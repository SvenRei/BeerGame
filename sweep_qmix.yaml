# method: grid, vary only seed [42,123,2024], pin the winning hyperparameters in
# the command, report mean +/- std.
#
# LAUNCH:  wandb sweep sweep_qmix.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================