program: scripts/train_qmix.py
method: bayes
metric:
  name: Avg_Cost_50
  goal: minimize
parameters:
  agent.lr:
    values: [0.001, 0.0005, 0.0001, 0.00005]
  agent.target_update_freq:
    values: [100, 200, 500, 1000]
  # UPGRADE 1: Expanded Batch Size Net
  agent.batch_size:
    values: [64, 128, 256, 512]
  # UPGRADE 2: Discretization Resolution Search
  agent.n_actions:
    values: [11, 21, 51, 101]
command:
  - venv/Scripts/python.exe
  - ${program}
  - agent=qmix
  - ${args_no_hyphens}