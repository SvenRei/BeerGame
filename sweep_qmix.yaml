# =============================================================================
# W&B SWEEP -- qmix  (vanilla QMIX: the NO-COMMUNICATION control, QMIX family)
# =============================================================================
# DESIGN PRINCIPLE (applies to all four sweep files): within each algorithm
# family, the no-comm control and the comm variant sweep IDENTICAL shared axes;
# the comm variant adds only communication-specific axes (vocab_size,
# comm_penalty_coef, tau_decay_episodes, tau_min). This removes the tuning-
# opportunity confound: any qmix-vs-comm_qmix difference cannot be explained by
# one arm having had access to hyperparameters the other did not.
#
# SHARED AXES for the QMIX family (identical here and in sweep_comm_qmix.yaml):
#   lr, target_update_freq, batch_size, action_mode, lr_scheduler_gamma
# PINNED in both (identical values, stated in the paper):
#   reward_scale=100, warm_up=1000, patience=2000, epsilon_decay=5000, seed=42
#
# OPTIMIZATION METRIC: Avg_Cost_500 (trailing 500-episode mean of system cost,
# logged every episode; the sweep reads its LAST value = converged performance).
# We deliberately do NOT optimize min(Avg_Cost_50): a 50-episode minimum rewards
# transient noise dips, which the QMIX family produces in abundance.
# Requires the Avg_Cost_500 logging patch in scripts/train_qmix.py.
# =============================================================================

program: scripts/train_qmix.py
project: BeerGame_Research
# entity: your-wandb-username

method: bayes

metric:
  name: Avg_Cost_500
  goal: minimize

run_cap: 30   # space = 3*2*2*2*2 = 48 combos / 5 dims; 30 Bayes runs is adequate.

# early_terminate intentionally OFF for the QMIX family: high variance means
# slow starters can recover; Hyperband would risk culling eventual winners.

parameters:

  # Learning rate: brackets the diagnostic winner (1e-3). Range consistent with
  # Adam-based QMIX practice (Rashid et al. 2018 use 5e-4 with RMSprop).
  agent.lr:
    values: [0.0005, 0.001, 0.002]

  # Target-network refresh, counted in EPISODES (code: `ep % target_update_freq`).
  # 200 episodes matches Rashid et al.; 600 tests a slower-moving bootstrap
  # target as the stability lever.
  agent.target_update_freq:
    values: [200, 600]

  # Replay batch (episodes per gradient step). 32 matches Rashid et al.; 64
  # halves gradient variance, directly targeting the observed cost swings.
  agent.batch_size:
    values: [32, 64]

  # Action parameterization: capped absolute orders vs the "d+x" rule
  # (Oroojlooyjadid et al. 2022). A structural axis, reported separately.
  agent.action_mode:
    values: ["absolute", "centered"]

 
# ---- Fixed run-control (identical to sweep_comm_qmix.yaml) -------------------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=qmix
  - hydra.job.chdir=False
  - hydra.output_subdir=null
  - total_episodes=15000
  - seed=42
  - agent.warm_up_episodes=1000
  - agent.patience=2000
  - agent.reward_scale=100
  - agent.epsilon_decay_episodes=5000
  - ${args_no_hyphens}
  - agent.lr_scheduler_gamma=1.0
# Phase 2 (after the search): grid over seed [42,123,2024,7,1009] at the winning
# config; report IQM and bootstrap CIs (Agarwal et al. 2021) on Avg_Cost_500.
# LAUNCH:  wandb sweep sweep_qmix.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================