program: scripts/train_qmix.py
method: bayes
metric:
  name: Avg_Cost_50
  goal: minimize
parameters:
  lr:
    values: [0.001, 0.0005, 0.0001, 0.00005]
  target_update_freq:
    values: [100, 200, 500, 1000]
  batch_size:
    values: [32, 64, 128]
command:
  - venv/Scripts/python.exe  # <--- THE OS FIX: Hardcode the venv Python path
  - ${program}
  - agent=qmix               # <--- Keep your agent architecture override
  - ${args_no_hyphens}       # <--- W&B automatically injects the sweep parameters here