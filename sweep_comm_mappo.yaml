# =============================================================================
# W&B SWEEP  --  comm_mappo   (PPO family WITH communication)
# =============================================================================
# CORRECTED. Changes that make this sweep actually launch (the previous version
# crashed on 100% of trials):
#   * vocab_size: [2,3,5,7] -> [1,3,5].
#       get_vocab_tensor() only supports 1/3/5; vocab=2 and vocab=7 raise
#       ValueError on the first forward. vocab=1 is the information-free NO-COMM
#       control (1-logit comm head -> constant token). 1 vs 3 vs 5 = the
#       value-of-communication ablation for the PPO family.
#   * removed agent.epsilon_decay_episodes.
#       PPO has NO epsilon-greedy. The key is absent from conf/agent/comm_mappo.yaml
#       and unread by train_ppo.py, so Hydra aborted at composition every trial.
#   * agent.tau_decay_episodes is swept -> REQUIRES the new key in
#       conf/agent/comm_mappo.yaml  (add:  tau_decay_episodes: 7500).
#
# entropy_coef IS meaningful here (the comm_head is a Categorical with an entropy
# bonus), so sweeping it is the right anti-collapse lever for the PPO family --
# unlike QMIX, which has no policy-entropy term.
#
# No train-script or agent-code change is required.
# =============================================================================

program: scripts/train_ppo.py
project: BeerGame_Research
# entity: your-wandb-username

method: bayes

metric:
  name: Avg_Cost_50
  goal: minimize

run_cap: 40
# SPACE SIZE: lr_actor(3) x entropy(3) x vocab(3) x comm_penalty(3) x lr_sched(2)
#   x action_mode(2) x tau_decay(3)  ~= 970 combinations. 40 runs cover ~4%.
# Trim or raise run_cap as needed.

# PPO is roughly monotonic here, so Hyperband can cull clearly-bad runs and save
# budget. (comm_mappo did destabilize late in the 5k diagnostic; summary="min"
# keeps the best checkpoint, and min_iter avoids judging before warm-up+margin.)
early_terminate:
  type: hyperband
  min_iter: 2000
  eta: 3

parameters:

  agent.lr_actor:
    values: [0.0001, 0.0003, 0.0005]

  # Token-diversity knob (start value, annealed to entropy_coef_end=0).
  agent.entropy_coef:
    values: [0.0, 0.01, 0.03]

  # *** HEADLINE ABLATION ***  1 = info-free no-comm control, 3 = working, 5 = richer.
  agent.vocab_size:
    values: [1, 3, 5]

  agent.comm_penalty_coef:
    values: [0.0001, 0.001, 0.01]

  agent.lr_scheduler_gamma:
    values: [0.5, 1.0]

  agent.action_mode:
    values: ["absolute", "centered"]

  # Gumbel tau anneals 1.0 -> 0.1 over this many episodes (message discreteness).
  # Consider also adding a value >= total_episodes to test slow-decay vs collapse.
  agent.tau_decay_episodes:
    values: [2500, 5000, 7500, 10000, 15000]

# ---- Fixed run-control (literal Hydra overrides, all keys exist) -------------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=comm_mappo
  - hydra.job.chdir=False
  - hydra.output_subdir=null
  - total_episodes=15000
  - seed=42
  - agent.warm_up_episodes=1000
  - agent.patience=2000
  - agent.reward_scale=100
  - ${args_no_hyphens}

# -----------------------------------------------------------------------------
# Phase-2 multi-seed confirmation: method: grid, vary only seed [42,123,2024],
# pin the winning hyperparameters, report mean +/- std.
#
# LAUNCH:  wandb sweep sweep_comm_mappo.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================