# =============================================================================
# W&B SWEEP -- comm_mappo  (PPO family WITH a learned discrete channel)
# =============================================================================
# DESIGN: shared axes are IDENTICAL to sweep_mappo.yaml (lr_actor, entropy_coef,
# action_mode, lr_scheduler_gamma), with eps_clip=0.1 and lr_critic=1e-3 pinned
# identically in both arms. On top of those, this sweep adds the four
# communication-specific axes.
#
# HEADLINE ABLATION: vocab_size in {1, 3, 5}; vocab=1 is the information-free
# within-architecture control (see sweep_comm_qmix.yaml header for the full
# rationale -- the logic is identical and intentionally mirrored across
# families, enabling the cross-family comparison of the SAME ablation).
#
# ANTI-COLLAPSE MECHANISMS available in the PPO family (unlike QMIX, which has
# only the temperature schedule): the entropy bonus here covers BOTH the action
# head and the message head (dist_comm), so entropy_coef directly rewards token
# diversity -- the closest mechanism in this codebase to the positive-signalling
# bias of Eccles et al. (2019). comm_penalty_coef is an L2 cost on the expected
# message; with the symmetric vocabulary it is minimized by the 0-token, so it
# prices communication rather than preventing collapse. The 0.0 control (newly
# added; the previous file lacked it) makes the cost effect measurable.
#
# tau_min REQUIRES the one-line patch in agents/rl/mappo.py (MAPPOTrainer) and
# the `tau_min: 0.1` key in conf/agent/comm_mappo.yaml (see the patch list).
#
# METRIC: Avg_Cost_500 (trailing 500-ep mean, last value) -- the comm_mappo
# diagnostic's 695->1600 late blow-up is exactly why min(Avg_Cost_50) is not a
# valid optimization target. Requires the logging patch in scripts/train_ppo.py.
# =============================================================================

program: scripts/train_ppo.py
project: BeerGame_Research
# entity: your-wandb-username

method: bayes

metric:
  name: Avg_Cost_500
  goal: minimize

run_cap: 80   # space = 36 shared * (3*3*3*2) comm = 1944 combos / 8 dims.
              # If budget forces a cut, drop tau_min (pin 0.1) and reduce to 60.

# Hyperband ON (PPO family), min_iter=4000: warm-up + 3000 learning episodes
# before any cull, so slow tau/entropy schedules are judged fairly.
early_terminate:
  type: hyperband
  min_iter: 4000
  eta: 3

parameters:

  # ---- SHARED AXES (identical to sweep_mappo.yaml) ----------------------------
  agent.lr_actor:
    values: [0.0001, 0.0003, 0.0005]

  # Covers action AND message heads -- the PPO family's token-diversity lever.
  agent.entropy_coef:
    values: [0.0, 0.01, 0.03]

  agent.action_mode:
    values: ["absolute", "centered"]

  agent.lr_scheduler_gamma:
    values: [0.5, 1.0]

  # ---- COMMUNICATION AXES (this sweep only) ----------------------------------
  # 1 = info-free control | 3 = ternary channel | 5 = richer vocabulary.
  agent.vocab_size:
    values: [1, 3, 5]

  # L2 cost on the expected message (0.0 = free channel control).
  agent.comm_penalty_coef:
    values: [0.0, 0.001, 0.01]

  # Episodes over which Gumbel tau anneals 1.0 -> tau_min.
  agent.tau_decay_episodes:
    values: [2500, 7500, 8000, 10000, 15000]

  # Temperature floor: 0.1 = prior near-discrete behavior; 0.5 = soft channel.
  agent.tau_min:
    values: [0.1, 0.5]

# ---- Fixed run-control (identical to sweep_mappo.yaml) ------------------------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=comm_mappo
  - hydra.job.chdir=False
  - hydra.output_subdir=null
  - total_episodes=15000
  - seed=42
  - agent.warm_up_episodes=1000
  - agent.patience=2000
  - agent.reward_scale=100
  - agent.lr_critic=0.001
  - agent.eps_clip=0.1
  - ${args_no_hyphens}

# Phase 2: grid over seed [42,123,2024,7,1009] at the winning config AND the
# same config with vocab_size=1; the per-seed paired difference is the headline
# statistic. Report IQM + bootstrap CIs on Avg_Cost_500.
# LAUNCH:  wandb sweep sweep_comm_mappo.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================