program: scripts/train_ppo.py
method: bayes
metric:
  goal: minimize
  name: Avg_Cost_50
parameters:
  agent.lr_actor:
    values: [0.00005, 0.0001, 0.0003, 0.001]
  agent.lr_critic:
    values: [0.0001, 0.0005, 0.001, 0.003]
  agent.k_epochs:
    values: [4, 10, 15]
  agent.eps_clip:
    values: [0.1, 0.2, 0.3]
  agent.entropy_coef:
    values: [0.01, 0.05, 0.1]

command:
  - venv/Scripts/python.exe
  - ${program}
  - agent=comm_mappo
  - ${args_no_hyphens}