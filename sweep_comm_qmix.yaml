# =============================================================================
# W&B SWEEP -- comm_qmix  (QMIX family WITH a learned discrete channel)
# =============================================================================
# DESIGN: shared axes are IDENTICAL to sweep_qmix.yaml (lr, target_update_freq,
# batch_size, action_mode, lr_scheduler_gamma) so the qmix-vs-comm_qmix
# comparison is not confounded by unequal tuning opportunity. On top of those,
# this sweep adds the four communication-specific axes.
#
# HEADLINE ABLATION: vocab_size in {1, 3, 5}. vocab=1 is an information-free
# channel (the message head is bypassed and a constant 0 is sent), i.e. the
# no-comm control WITHIN the comm architecture: identical parameter count,
# identical input wiring, zero transmissible information. The vocab=1 vs
# vocab=3/5 gap is therefore a clean measurement of the value of communication,
# uncontaminated by architecture differences. (This within-architecture control
# carries the main claim; qmix-vs-comm_qmix is a secondary architecture
# comparison.)
#
# COLLAPSE LEVERS (and an honest note on the penalty): the only mechanisms in
# this codebase that influence token diversity for the QMIX family are the
# Gumbel-softmax temperature schedule (tau_decay_episodes, tau_min) -- there is
# no message-entropy bonus (cf. Eccles et al. 2019). comm_penalty_coef is an L2
# cost on the emitted message value: with the symmetric vocabulary {-1,0,+1} it
# is minimized by the 0-token, so it PRICES communication (silence is free)
# rather than preventing collapse. It is swept with a 0.0 control so the
# cost-of-communication effect is measurable, not assumed.
#
# tau_min REQUIRES the one-line patch in scripts/train_comm_qmix.py and the
# `tau_min: 0.1` key in conf/agent/comm_qmix.yaml (see the patch list).
# The hardcoded 0.1 floor sits below the tau ranges typical of Gumbel-based
# emergent-communication work (~0.5-2); 0.5 tests whether a softer floor
# preserves the channel.
#
# METRIC: Avg_Cost_500 (trailing 500-ep mean, last value) -- converged
# performance, not transient minima. Requires the logging patch.
# =============================================================================

program: scripts/train_comm_qmix.py
project: BeerGame_Research
# entity: your-wandb-username

method: bayes

metric:
  name: Avg_Cost_500
  goal: minimize

run_cap: 80   # space = 48 shared * (3*3*3*2) comm = 2592 combos / 9 dims.
              # ~10 runs per dimension is the working minimum for Bayes here;
              # if budget forces a cut, drop tau_min (pin 0.1) before anything
              # else and reduce to run_cap 60.

# early_terminate OFF (QMIX family; see sweep_qmix.yaml).

parameters:

  # ---- SHARED AXES (identical to sweep_qmix.yaml) ----------------------------
  agent.lr:
    values: [0.0005, 0.001, 0.002]

  # Counted in EPISODES (code: `ep % target_update_freq`).
  agent.target_update_freq:
    values: [200, 600]

  agent.batch_size:
    values: [32, 64]

  agent.action_mode:
    values: ["absolute", "centered"]

  #agent.lr_scheduler_gamma:
  #  values: [0.5, 1.0]

  # ---- COMMUNICATION AXES (this sweep only) ----------------------------------
  # 1 = info-free control | 3 = ternary channel | 5 = richer vocabulary.
  agent.vocab_size:
    values: [1, 3, 5]

  # L2 cost on the emitted message (0.0 = free channel control). See header.
  agent.comm_penalty_coef:
    values: [0.0, 0.01]

  # Episodes over which Gumbel tau anneals tau_start(1.0) -> tau_min.
  # 15000 = anneal spans the whole run (tau reaches the floor only at the end).
  agent.tau_decay_episodes:
    values: [2500, 7500, 8000, 10000, 15000]

  # Temperature floor. 0.1 = near-discrete late-training messages (prior
  # behavior); 0.5 = permanently soft channel, the literature-typical regime.
  agent.tau_min:
    values: [0.1, 0.5]

  # POSITIVE-LISTENING bonus (the fix for signalling-without-listening).
  # 0.0 = control (current behavior); the sweep itself thereby contains the
  # with/without-listening comparison. Inert for vocab_size=1 by construction.
  agent.listening_coef:
    values: [0.0, 0.05, 0.2]

# ---- Fixed run-control (identical to sweep_qmix.yaml) -------------------------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=comm_qmix
  - hydra.job.chdir=False
  - hydra.output_subdir=null
  - total_episodes=15000
  - seed=42
  - agent.warm_up_episodes=1000
  - agent.patience=2000
  - agent.reward_scale=100
  - agent.epsilon_decay_episodes=5000
  - ${args_no_hyphens}
  - agent.lr_scheduler_gamma=1.0

# Phase 2: grid over seed [42,123,2024,7,1009] at the winning config AND at the
# same config with vocab_size=1 -- the per-seed paired difference is the
# headline statistic. Report IQM + bootstrap CIs on Avg_Cost_500.
# LAUNCH:  wandb sweep sweep_comm_qmix.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================