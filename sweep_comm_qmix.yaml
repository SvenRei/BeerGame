# =============================================================================
# W&B SWEEP  --  comm_qmix   (QMIX family WITH communication)
# =============================================================================
# CORRECTED. Changes that make this sweep actually launch (the previous version
# crashed on 100% of trials):
#   * vocab_size: [2,3,5,7] -> [1,3,5].
#       get_vocab_tensor() only supports 1/3/5; vocab=2 and vocab=7 raise
#       ValueError on the first forward. vocab=1 is NOT blocked -- it is the
#       information-free NO-COMM control (CommQMixLocalAgent short-circuits it to
#       a constant-zero message). 1 vs 3 vs 5 IS the headline ablation.
#   * removed agent.entropy_coef.
#       QMIX has no policy-entropy term and the key is absent from
#       conf/agent/comm_qmix.yaml, so Hydra aborted at composition every trial.
#   * removed the duplicate pinned `agent.reward_scale=100` from `command`.
#       reward_scale is swept below; ${args_no_hyphens} ran last and overrode the
#       pinned value anyway, so the pinned line was dead and misleading.
#   * agent.tau_decay_episodes is swept -> REQUIRES the new key in
#       conf/agent/comm_qmix.yaml  (add:  tau_decay_episodes: 7500).
#       Without that one line, Hydra aborts at composition again.
#
# MECHANICS: params reach the code as Hydra CLI overrides via `command` +
# ${args_no_hyphens} (dotted agent.* names). Every swept/fixed key below now
# EXISTS in comm_qmix.yaml, so composition succeeds and the value is read by
# scripts/train_comm_qmix.py. No train-script or agent-code change is required.
# =============================================================================

program: scripts/train_comm_qmix.py
project: BeerGame_Research
# entity: your-wandb-username

method: bayes

metric:
  name: Avg_Cost_50
  goal: minimize
  # NB: both train scripts define this metric with summary="min", so the sweep
  # optimizes the BEST 50-ep average over the run. For high-variance QMIX that
  # can reward a lucky transient dip -- confirm winners with the Phase-2 seeds.

run_cap: 40
# SPACE SIZE: lr(3) x vocab(3) x comm_penalty(3) x target(2) x action_mode(2)
#   x tau_decay(3) x reward_scale(3) x lr_sched(2)  ~= 1900 combinations.
# 40 Bayes runs cover ~2% of that. Either raise run_cap or drop low-value axes.
# First to drop if you need to trim:
#   - reward_scale (redundant with lr for gradient scale; does NOT affect the
#     logged Avg_Cost_50 -- it only rescales the TD target), and
#   - action_mode (a structural choice; cleaner to run the two modes as separate
#     sweeps so each can find its own lr).

# early_terminate intentionally OFF for the QMIX family: it is noisy and slow
# starters can recover, so Hyperband would risk killing an eventual winner.

parameters:

  agent.lr:
    values: [0.0005, 0.001, 0.002]

  # *** HEADLINE ABLATION ***  1 = info-free no-comm control, 3 = working, 5 = richer.
  agent.vocab_size:
    values: [1, 3, 5]

  agent.comm_penalty_coef:
    values: [0.0, 0.001, 0.01]

  # NOTE: counted in EPISODES in the code (ep % target_update_freq), NOT env steps.
  agent.target_update_freq:
    values: [200, 600]

  agent.action_mode:
    values: ["absolute", "centered"]

  # Gumbel tau anneals 1.0 -> 0.1 over this many episodes. This is the main lever
  # against token collapse. With total_episodes=15000, consider also adding a
  # value >= total_episodes (e.g. 15000) to test whether slow decay keeps the
  # channel diverse.
  agent.tau_decay_episodes:
    values: [2500, 5000, 7500]

  # Rescales the TD target only (NOT the logged cost). Stays <= 100 ("never 1000").
  agent.reward_scale:
    values: [10, 50, 100]

  agent.lr_scheduler_gamma:
    values: [0.5, 1.0]

# ---- Fixed run-control (literal Hydra overrides, all keys exist) -------------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=comm_qmix
  - hydra.job.chdir=False
  - hydra.output_subdir=null
  - total_episodes=15000
  - seed=42
  - agent.warm_up_episodes=1000
  - agent.patience=2000
  - agent.epsilon_decay_episodes=5000
  - ${args_no_hyphens}

# -----------------------------------------------------------------------------
# Phase-2 multi-seed confirmation: method: grid, vary only seed [42,123,2024],
# pin the winning hyperparameters in `command`, report mean +/- std.
#
# LAUNCH:  wandb sweep sweep_comm_qmix.yaml  ->  wandb agent <SWEEP_ID>
# =============================================================================