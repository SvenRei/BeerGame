# =============================================================================
# W&B SWEEP  --  comm_qmix   (THE CURRENT WINNER: ~7.4k Avg_Cost_50 at 5k eps)
# =============================================================================
# This is your most important sweep. comm_qmix is ~3.4x better than the next
# agent, so the highest-value tuning happens here. The vocab_size axis below is
# arguably your single most important SCIENTIFIC result (see its comment).
#
# -----------------------------------------------------------------------------
# HOW PARAMETERS REACH THE CODE  (read this once -- it's the same in all 5 files)
# -----------------------------------------------------------------------------
# We do NOT rely on wandb.config injection. Instead the `command:` block below
# passes every swept parameter as a HYDRA OVERRIDE on the command line, e.g.
#       agent.lr=0.001 agent.vocab_size=3 ...
# Why: train_qmix.py / train_ppo.py compose config via Hydra. Hydra applying a
# CLI override is the single source of truth. (train_ppo.py's open_dict block
# only reads a FIXED allow-list from wandb.config and does NOT include
# comm_penalty_coef or target_update_freq -- so the wandb.config route would
# silently drop them. The Hydra-override route works for ALL keys.)
#
# Because we name parameters with their full dotted path (agent.lr, not lr),
# the wandb.config allow-list check (`if "lr" in wandb.config`) never fires, so
# there is no double-application. Hydra's value stands. This is intentional.
#
# Note on prefixes (mirror the manual CLI commands you already ran):
#   * top-level keys  -> NO prefix:  total_episodes, seed
#   * agent keys      -> agent.*  :  agent.lr, agent.warm_up_episodes, ...
# =============================================================================

program: agents/rl/train_qmix.py   # path RELATIVE to where you run `wandb agent`
                                   # (launch from repo root) -- or use an absolute path.
project: BeerGame_Research         # must match wandb.init(project=...) in the code
# entity: your-wandb-username      # uncomment + set to your wandb user/team

method: bayes                      # Bayesian search. Do NOT use grid here: the full
                                   # grid (lr x vocab x penalty x target) is 54 combos
                                   # x 3 seeds = 162 runs. Bayes finds good regions fast.

# ---- Optimization target ----------------------------------------------------
metric:
  name: Avg_Cost_50                # the smoothed 50-episode mean cost (logged every ep)
  goal: minimize                   # lower cost = better
  # NOTE: W&B optimizes the run's SUMMARY value of this metric (= last logged
  # value by default). For converged comm_qmix runs the last 50-ep average is
  # stable (last500 mean 7430 vs last 7526), so last-value is a fine proxy.

run_cap: 40                        # stop the whole sweep after 40 runs. Bump if the
                                   # search hasn't plateaued. Protects your GCP budget.

# ---- DO NOT early-terminate QMIX --------------------------------------------
# Hyperband would kill "slow starters". But your OWN comm_qmix run DIPPED to
# ~47k at ~10% of training, then RECOVERED to 7k. Hyperband at min_iter~1000
# would have murdered the eventual winner. So early_terminate stays OFF for the
# QMIX family. (It's enabled for the PPO family, which converges monotonically.)
# early_terminate:
#   type: hyperband
#   min_iter: 3000

# ---- Swept hyperparameters --------------------------------------------------
parameters:

  # LEARNING RATE. 1e-3 won at 5k; 5e-4 was tested and underperformed. We bracket
  # the winner and probe slightly higher. (Reverting Huber->MSE is what fixed
  # QMIX; this LR range assumes MSE is in the code -- confirm before launching.)
  agent.lr:
    values: [0.0005, 0.001, 0.002]

  # *** THE HEADLINE ABLATION ***
  # vocab_size = number of discrete communication tokens.
  #   1 -> a 1-symbol "vocabulary" carries ZERO information = the NO-COMM control.
  #        This is your clean ablation: comm_qmix(vocab=1) should collapse toward
  #        vanilla qmix (~29k). The gap between vocab=1 and vocab=3/5 IS the
  #        measured value of communication. This single axis answers
  #        "does communication help, and how much vocabulary does it need?"
  #   3 -> the configuration that produced your 7.4k winner.
  #   5 -> tests whether a richer vocabulary buys anything beyond 3.
  agent.vocab_size:
    values: [1, 3, 5]

  # COMMUNICATION PENALTY. At 5k, penalty=0.0 did NOT collapse (tokens held 3.0),
  # so 0.0 is a legitimate setting here. We still probe small positive values in
  # case longer 10k training drifts toward collapse. With vocab=1 this is moot.
  agent.comm_penalty_coef:
    values: [0.0, 0.001, 0.01]

  # TARGET-NETWORK refresh (in env steps). Vanilla qmix was noisy at 200; a less
  # frequent target update can stabilize the bootstrap. comm_qmix was stable at
  # 200, but we let Bayes explore whether 600 helps the 10k run.
  agent.target_update_freq:
    values: [200, 600]

# ---- Fixed run-control (passed as literal Hydra overrides, NOT swept) -------
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - agent=comm_qmix            # selects conf/agent/comm_qmix.yaml (the Hydra group)
  - total_episodes=10000       # longer than the 5k diagnostic: these numbers go in the thesis
  - seed=42                    # FIXED during search (see multi-seed note at bottom)
  - agent.warm_up_episodes=1000  # production warm-up (fills replay buffer)
  - agent.patience=2000        # re-enable early-stop so good configs end & save budget
  - agent.reward_scale=100     # CRITICAL: 100, never 1000 (1000 caused the divergence)
  - agent.epsilon_decay_episodes=5000  # gentle exploration anneal over 10k eps
  - ${args_no_hyphens}         # <-- the swept params land here as agent.lr=... etc.

# =============================================================================
# MULTI-SEED CONFIRMATION (Phase 2) -- do this AFTER the search picks a winner
# =============================================================================
# Single-seed search finds the region; it does NOT give error bars. QMIX variance
# is large (qmix swung 16k-82k), so a reviewer will demand seed averaging.
# Once you have the best config, run a SMALL grid sweep over seeds only:
#
#   method: grid
#   parameters:
#     seed:
#       values: [42, 123, 2024]
#   command:
#     - ${env}
#     - ${interpreter}
#     - ${program}
#     - agent=comm_qmix
#     - total_episodes=10000
#     - agent.warm_up_episodes=1000
#     - agent.patience=2000
#     - agent.reward_scale=100
#     - agent.epsilon_decay_episodes=5000
#     - agent.lr=<BEST>                 # paste the winning values here
#     - agent.vocab_size=<BEST>
#     - agent.comm_penalty_coef=<BEST>
#     - agent.target_update_freq=<BEST>
#     - ${args_no_hyphens}
#
# Then report mean +/- std over the 3 seeds. (Do NOT put seed in a `bayes` sweep
# -- optimizing over seed is statistically meaningless.)
#
# -----------------------------------------------------------------------------
# LAUNCH (GCP):
#   1) From repo root:           wandb sweep sweep_comm_qmix.yaml
#      -> prints a SWEEP_ID like: your-entity/BeerGame_Research/abc123
#   2) On each GCP VM/worker:    wandb agent your-entity/BeerGame_Research/abc123
#      Run the agent on several VMs in parallel; they all pull from one sweep.
#   3) If Hydra writes runs into outputs/DATE/TIME subdirs and that bothers you,
#      add `hydra.job.chdir=False` to the command list (Hydra >= 1.1 only).
# =============================================================================